<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Google</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-[#F0F4F9] min-h-screen flex items-center justify-center p-4">

  <div id="chooser-card" class="bg-white rounded-[28px] p-8 sm:p-10 max-w-[440px] w-full shadow-sm border border-gray-200/50 flex flex-col">
    <!-- Google Logo -->
    <div class="flex justify-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
      </svg>
    </div>

    <!-- Titles -->
    <h1 class="text-2xl text-gray-900 font-normal text-center tracking-tight mb-2">Choose an account</h1>
    <p class="text-sm text-gray-600 text-center mb-8">to continue to <span class="font-semibold text-purple-600">NeverLate</span></p>

    <!-- Account list -->
    <div id="account-list" class="space-y-1.5 flex-1">
      <!-- Default User Account Option -->
      <button onclick="selectAccount('nidhiverma777777@gmail.com', 'Nidhi Verma', '')" class="w-full text-left p-4 rounded-xl hover:bg-gray-100/80 transition-colors flex items-center justify-between group">
        <div class="flex items-center gap-3.5">
          <div class="w-8 h-8 rounded-full bg-purple-100 border border-purple-300 flex items-center justify-center font-bold text-sm text-purple-800 font-mono">
            N
          </div>
          <div>
            <div class="text-sm font-semibold text-gray-800">Nidhi Verma</div>
            <div class="text-xs text-gray-500">nidhiverma777777@gmail.com</div>
          </div>
        </div>
        <span class="text-xs text-[#0B57D0] font-medium opacity-0 group-hover:opacity-100 transition-opacity">Signed in</span>
      </button>

      <!-- Custom Account Trigger Option -->
      <button onclick="showCustomInput()" class="w-full text-left p-4 rounded-xl hover:bg-gray-100/80 transition-colors flex items-center gap-3.5">
        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </div>
        <div>
          <div class="text-sm font-semibold text-gray-800">Use another account</div>
          <div class="text-xs text-gray-500">Log in with a different Google account</div>
        </div>
      </button>
    </div>

    <!-- Custom Account Input View (Hidden by default) -->
    <div id="custom-input-view" class="hidden space-y-4">
      <div class="space-y-3 text-left">
        <div>
          <label class="block text-xs font-semibold text-gray-700 mb-1">Google Email</label>
          <input id="custom-email" type="email" placeholder="you@gmail.com" class="w-full text-sm px-3.5 py-2.5 bg-[#FAF9F6] border border-gray-300 rounded-lg focus:outline-none focus:border-[#0B57D0] transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-700 mb-1">Full Name</label>
          <input id="custom-name" type="text" placeholder="Your Name" class="w-full text-sm px-3.5 py-2.5 bg-[#FAF9F6] border border-gray-300 rounded-lg focus:outline-none focus:border-[#0B57D0] transition-colors">
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <button onclick="hideCustomInput()" class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-50 transition-colors">
          Back
        </button>
        <button onclick="submitCustomAccount()" class="flex-1 py-2.5 bg-[#0B57D0] text-white rounded-lg text-sm font-semibold hover:bg-[#0A4CC0] transition-colors">
          Continue
        </button>
      </div>
    </div>

    <!-- Security disclaimer -->
    <div class="mt-8 pt-6 border-t border-gray-100 text-[11px] text-gray-500 leading-normal text-left">
      To continue, Google will share your name, email address, profile picture, and language preference with NeverLate. Refer to NeverLate's Privacy Policy and Terms of Service.
    </div>
  </div>

  <!-- Loading State (Hidden by default) -->
  <div id="loading-view" class="hidden bg-white rounded-[28px] p-10 max-w-[440px] w-full shadow-sm border border-gray-200/50 flex flex-col items-center justify-center min-h-[350px]">
    <div class="w-12 h-12 border-4 border-gray-100 border-t-[#0B57D0] rounded-full animate-spin mb-6"></div>
    <h2 class="text-lg font-normal text-gray-800 tracking-tight">Signing you in...</h2>
    <p id="loading-email" class="text-xs text-gray-500 mt-1"></p>
  </div>

  <script>
    function selectAccount(email, name, picture) {
      document.getElementById('chooser-card').classList.add('hidden');
      document.getElementById('loading-email').innerText = email;
      document.getElementById('loading-view').classList.remove('hidden');

      setTimeout(() => {
        if (window.opener) {
          window.opener.postMessage({
            type: 'OAUTH_GOOGLE_SUCCESS',
            email: email,
            name: name,
            picture: picture || ''
          }, '*');
          window.close();
        } else {
          alert('Window opener not found! Please check iframe setup.');
        }
      }, 1000);
    }

    function showCustomInput() {
      document.getElementById('account-list').classList.add('hidden');
      document.getElementById('custom-input-view').classList.remove('hidden');
      document.getElementById('custom-email').focus();
    }

    function hideCustomInput() {
      document.getElementById('custom-input-view').classList.add('hidden');
      document.getElementById('account-list').classList.remove('hidden');
    }

    function submitCustomAccount() {
      const email = document.getElementById('custom-email').value.trim();
      const name = document.getElementById('custom-name').value.trim();

      if (!email || !email.includes('@')) {
        alert('Please enter a valid Google email address.');
        return;
      }
      const displayName = name || email.split('@')[0];

      selectAccount(email, displayName, '');
    }
  </script>
</body>
</html>
